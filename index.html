<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoSmart Bin AI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    padding: 40px;
}

h1 {
    font-size: 42px;
}

.tagline {
    opacity: 0.8;
    margin-bottom: 30px;
}

.scan-btn {
    background: linear-gradient(45deg, #00c853, #64dd17);
    border: none;
    padding: 15px 35px;
    font-size: 18px;
    border-radius: 50px;
    cursor: pointer;
    color: white;
    box-shadow: 0 0 20px rgba(0,255,100,0.4);
}

.scan-btn:hover {
    transform: scale(1.08);
}

.camera-box canvas {
    margin-top: 25px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,255,200,0.6);
}

.card {
    background: rgba(255,255,255,0.08);
    margin: 25px auto;
    padding: 25px;
    border-radius: 20px;
    width: 340px;
    backdrop-filter: blur(12px);
}

.score-box {
    margin-top: 20px;
    font-size: 20px;
    background: rgba(0,0,0,0.4);
    padding: 12px 25px;
    border-radius: 30px;
    display: inline-block;
}
</style>
</head>

<body>

<div class="container">
    <h1>♻ EcoSmart Bin</h1>
    <p class="tagline">Scan your waste. Save the planet 🌍</p>

    <button class="scan-btn" onclick="init()">📸 Scan Item</button>

    <div id="webcam-container" class="camera-box"></div>

    <div class="card">
        <div id="result">Waiting for scan...</div>
        <div id="instruction"></div>
    </div>

    <div class="score-box">
        🌱 Eco Points: <span id="score">0</span>
    </div>
</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/x-ek30_EM/"; // YOUR MODEL

let model, webcam;
let score = 0;
let lastDetected = "";

async function init() {
    try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        webcam = new tmImage.Webcam(320, 320, true);
        await webcam.setup();
        await webcam.play();

        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

    } catch (e) {
        alert("Error: " + e);
        console.log(e);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let highestProb = 0;
    let detectedClass = "";

    // ✅ FIRST calculate highest probability
    prediction.forEach(p => {
        if (p.probability > highestProb) {
            highestProb = p.probability;
            detectedClass = p.className;
        }
    });

    // ✅ THEN apply threshold
    if (highestProb < 0.6) {
        document.getElementById("result").innerHTML = "❌ Not sure...";
        document.getElementById("instruction").innerHTML = "Try again";
        return;
    }

    let confidence = (highestProb * 100).toFixed(1);

    document.getElementById("result").innerHTML =
        `Detected: ${detectedClass} (${confidence}%)`;

    let instruction = "";

    if (detectedClass === "Plastic") {
        instruction = "♻ Wash before recycling";
    } else if (detectedClass === "Paper") {
        instruction = "📄 Keep dry and recycle";
    } else if (detectedClass === "Metal") {
        instruction = "🥫 Clean before recycling";
    } else if (detectedClass === "Glass") {
        instruction = "🍾 Handle carefully";
    } else {
        instruction = "Dispose properly";
    }

    document.getElementById("instruction").innerHTML = instruction;

    // 🌱 Eco points
    score += 5;
    document.getElementById("score").innerText = score;

    // 🔊 Voice (ONLY when class changes)
    if (detectedClass !== lastDetected) {
        speechSynthesis.cancel();
        speechSynthesis.speak(new SpeechSynthesisUtterance(instruction));
        lastDetected = detectedClass;
    }
}
</script>

</body>
</html>
